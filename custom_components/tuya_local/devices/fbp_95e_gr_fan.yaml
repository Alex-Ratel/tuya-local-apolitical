name: Fan
products:
  - id: enxohlgemolf1cqy
    model: FBP-95E-GR
entities:
  - entity: fan
    name: Fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: normal
            value: normal
          - dps_val: nature
            value: nature
          - dps_val: sleep
            value: sleep
      - id: 3
        type: integer
        name: speed
        range:
          min: 1
          max: 12
      - id: 5
        type: boolean
        name: oscillate
  - entity: switch
    name: Anion
    category: config
    dps:
      - id: 9
        type: boolean
        name: switch
  - entity: switch
    name: Sound
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: select
    name: Timer
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: "Cancel"
          - dps_val: 1h
            value: "1h"
          - dps_val: 2h
            value: "2h"
          - dps_val: 3h
            value: "3h"
          - dps_val: 4h
            value: "4h"
          - dps_val: 5h
            value: "5h"
          - dps_val: 6h
            value: "6h"
